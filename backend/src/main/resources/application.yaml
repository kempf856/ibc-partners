kind: Application

server:
  forward-headers-strategy: framework

spring:
  application:
    name: IBC Partners
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5444/ibcpartner}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:ibcpartner}
    password: ${SPRING_DATASOURCE_PASSWORD:ibcpartner}
  flyway:
    baseline-on-migrate: true
    enabled: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: your@gmail.com
    password: app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:mindegycsakvalamiszóljonjeegyhülyegitárosszólozzonjó}
    expiration: 3600000

management:
  endpoints:
    web:
      exposure:
        include: info
      base-path: /api/actuator

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}
  bootstrap-admin-email: ${APP_ADMIN_EMAIL}