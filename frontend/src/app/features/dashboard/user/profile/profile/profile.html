<div class="form-page-wrapper mw-md">
  <div class="page-header">
    <h1>Saját fiók</h1>
  </div>

  <mat-tab-group [(selectedIndex)]="selectedTab">
    <mat-tab label="Ajánlás">
      <app-referral-code></app-referral-code>
    </mat-tab>
    <mat-tab label="Jutalékok">
      <app-commission-list></app-commission-list>
    </mat-tab>
    @if (activePartnerService.activePartnerId()) {
      <mat-tab label="Kedvezmények - {{ activePartnerService.getActivePartnerName() }}">
        <app-discount-account-list [buyerId]="activePartnerService.activePartnerId()"></app-discount-account-list>
        <app-discount-account-list [sellerId]="activePartnerService.activePartnerId()"></app-discount-account-list>
      </mat-tab>
    }
  </mat-tab-group>
</div>
