<div class="form-page-wrapper mw-sm">
  <div class="page-header">
    <h2>Ajánlás</h2>
  </div>

  <div class="form-page">
    <section class="form-block">
      <div class="readonly-field">
        <span class="label">Ajánlói kód</span>
        <span class="value">{{ referralCode() }}</span>
      </div>
      <div class="readonly-field">
        <span class="label">Ajánlói link</span>
        <span class="value">
          <a [href]="fullUrl()" target="_blank" matTooltip="{{ fullUrl() }}">
            {{ shortUrl() }}
          </a>

          <button
            mat-icon-button
            (click)="copyUrl()"
            matTooltip="Másolás">
            <mat-icon>content_copy</mat-icon>
          </button>
        </span>
      </div>
      <div class="readonly-field">
        <span class="label">QR kód</span>
        <span>
          <img [src]="qrUrl()" alt="QR kód"/>
        </span>
      </div>
    </section>
  </div>
</div>
