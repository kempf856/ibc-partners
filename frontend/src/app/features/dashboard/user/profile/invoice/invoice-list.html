<div class="form-page-wrapper mw-sm">
  <div class="page-header">
    <h2>Számlák</h2>
  </div>

  <table mat-table [dataSource]="invoices()" matSort (matSortChange)="onSort($event)">

    <ng-container matColumnDef="userName">
      <th mat-header-cell *matHeaderCellDef>Felhasználó</th>
      <td mat-cell *matCellDef="let invoice">{{ invoice.userName }}</td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Számlázás dátuma</th>
      <td mat-cell *matCellDef="let invoice">{{ invoice.createdAt | date:'yyyy.MM.dd' }}</td>
    </ng-container>

    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef>Összeg</th>
      <td mat-cell *matCellDef="let invoice">{{ invoice.amount | number:'1.0-0' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>

      <td mat-cell *matCellDef="let invoice">
        <button mat-icon-button matTooltip="Megtekintés">
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
  </table>

  <mat-paginator
    [length]="totalElements()"
    [pageSize]="pageSize()"
    [pageIndex]="pageIndex()"
    [pageSizeOptions]="[10, 20, 50]"
    (page)="onPage($event)">
  </mat-paginator>
</div>
