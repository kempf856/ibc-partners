<div class="form-page-wrapper mw-md">
  <div class="page-header">
    <h1>Jutalékok</h1>
  </div>

  <div class="form-page">
    <section class="form-block">
      <mat-form-field>
        <mat-label>Felhasználó</mat-label>
        <mat-select [formControl]="userIdControl">
          <mat-option></mat-option>
          @for (admin of allUsers.value()?.content; track admin.id) {
            <mat-option [value]="admin.id">
              {{ admin.fullName }}
            </mat-option>
          }
        </mat-select>
      </mat-form-field>
    </section>
  </div>

  @if (userId(); as id) {
    <app-invoice-list [userId]="id"></app-invoice-list>
    <app-commission-list [userId]="id"></app-commission-list>
  }
</div>
