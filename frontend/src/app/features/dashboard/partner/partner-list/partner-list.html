<div class="single-page-wrapper mw-lg">
  <div class="page-header">
    <h1>Partner adatbázis</h1>
  </div>

  <div class="filters-bar">
    <div class="filters">
      <mat-form-field appearance="outline">
        <mat-label>Cégnév</mat-label>
        <input matInput [(ngModel)]="nameFilter" (ngModelChange)="loadPartners()">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Település</mat-label>
        <input matInput [(ngModel)]="addressFilter" (ngModelChange)="loadPartners()">
      </mat-form-field>

      <mat-form-field appearance="outline" class="multiselect-field">
        <mat-label>Tevékenységek</mat-label>
        <mat-select [(ngModel)]="activityFilter" (selectionChange)="loadPartners()" multiple>
          @for (activity of activities; track activity) {
            <mat-option [value]="activity.id">
              {{ activity.activity }}
            </mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>
    <div class="list-actions">
      <button matButton="elevated" routerLink="/partners/create">
        Új partner
      </button>
    </div>
  </div>

  <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSort($event)">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Cégnév</th>
      <td mat-cell *matCellDef="let partner">{{ partner.name }}</td>
    </ng-container>

    <ng-container matColumnDef="headquarters">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Székhely</th>
      <td mat-cell *matCellDef="let partner">{{ partner.headquarters }}</td>
    </ng-container>

    <ng-container matColumnDef="activities">
      <th mat-header-cell *matHeaderCellDef>Tevékenységek</th>
      <td mat-cell *matCellDef="let partner">{{ activitiesText(partner.activities) }}</td>
    </ng-container>

    <ng-container matColumnDef="website">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Webhely</th>
        <td mat-cell *matCellDef="let partner">
          @if (partner.website) {
            <a [href]="partner.website" target="_blank">link</a>
          } @else {
            <span>-</span>
          }
        </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>

      <td mat-cell *matCellDef="let partner">
        <button mat-icon-button matTooltip="Megtekintés" [routerLink]="['/partners/view', partner.id]">
          <mat-icon>visibility</mat-icon>
        </button>

        <button mat-icon-button matTooltip="Szerkesztés" [routerLink]="['/partners/edit', partner.id]">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['name', 'headquarters', 'activities', 'website', 'actions']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['name', 'headquarters', 'activities', 'website', 'actions']"></tr>

  </table>

  <mat-paginator
    [length]="totalElements"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [pageSizeOptions]="[10, 20, 50]"
    (page)="onPage($event)">
  </mat-paginator>
</div>
