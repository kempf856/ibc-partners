<div class="single-page-wrapper mw-lg">
  <div class="page-header">
    <h1>Diák</h1>
  </div>

  <div class="filters-bar space-after">
    <div class="filters">
      <mat-button-toggle-group [formControl]="activeFilter">
        <mat-button-toggle [value]="'active'">Aktív</mat-button-toggle>
        <mat-button-toggle [value]="'all'">Mind</mat-button-toggle>
      </mat-button-toggle-group>
    </div>
    <div class="list-actions">
      <button matButton="elevated" routerLink="/slides/create">Új dia</button>
    </div>
  </div>

  <table mat-table [dataSource]="slides()">

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Megnevezés</th>
      <td mat-cell *matCellDef="let slide">{{ slide.description }}</td>
    </ng-container>

    <ng-container matColumnDef="active">
      <th mat-header-cell *matHeaderCellDef>Aktív</th>
      <td mat-cell *matCellDef="let slide">
        <mat-chip-set>
          <mat-chip [highlighted]="slide.active">
            {{ slide.active ? 'Megjelenik' : 'Rejtett' }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="visibleFrom">
      <th mat-header-cell *matHeaderCellDef>Megjelenés kezdete</th>
      <td mat-cell *matCellDef="let slide">{{ slide.visibleFrom | date:'yyyy.MM.dd' }}</td>
    </ng-container>

    <ng-container matColumnDef="visibleTo">
      <th mat-header-cell *matHeaderCellDef>Megjelenés vége</th>
      <td mat-cell *matCellDef="let slide">{{ slide.visibleTo | date:'yyyy.MM.dd' }}</td>
    </ng-container>

    <ng-container matColumnDef="sortOrder">
      <th mat-header-cell *matHeaderCellDef>Sorrend</th>
      <td mat-cell *matCellDef="let slide">{{ slide.sortOrder }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>

      <td mat-cell *matCellDef="let slide">
        <button mat-icon-button matTooltip="Szerkesztés" [routerLink]="['/slides', slide.id]">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Törlés" (click)="delete(slide)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['sortOrder', 'description', 'active', 'visibleFrom', 'visibleTo', 'actions']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['sortOrder', 'description', 'active', 'visibleFrom', 'visibleTo', 'actions']"></tr>

  </table>

  <mat-paginator
    [length]="totalElements"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [pageSizeOptions]="[10, 20, 50]"
    (page)="onPage($event)">
  </mat-paginator>
</div>
