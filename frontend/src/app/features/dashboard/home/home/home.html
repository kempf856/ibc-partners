  <swiper-container #swiper init="false" slides-per-view="1" loop="true">
    @for (slide of slides(); track slide.id) {
      <swiper-slide>
        <img [src]="slide.slide" [alt]="slide.description">
      </swiper-slide>
    }
  </swiper-container>
