<div class="shell">

  <!-- TOP BAR -->
  <mat-toolbar class="topbar">
    <div class="brand">
      <a routerLink="/dashboard">
        <img src="/myibc_logo.png" alt="myIBC"/>
      </a>
    </div>

    @if (authService.isLoggedIn()) {
      <div class="menu">
        <button matButton routerLink="/dashboard">Partner adatbázis</button>
        @if (authService.hasRole(Role.ADMIN)) {
          <button matButton routerLink="/applications">Érdeklődők</button>
          <button matButton routerLink="/users">Felhasználók</button>
        }
        <button matButton routerLink="/profile">Saját fiók</button>
      </div>

      <div class="logout">
        <button matButton (click)="logout()">Kijelentkezés</button>
      </div>
    }
  </mat-toolbar>

  <!-- CONTENT -->
  <div class="content">
    <router-outlet></router-outlet>
  </div>

  <!-- BOTTOM BAR -->
  <mat-toolbar class="bottombar">
    <div class="menu">
      <button matButton routerLink="/aszf">ÁSZF</button>
      <button matButton routerLink="/gdpr">Adatkezelés nyilatkozat</button>
      <button matButton routerLink="/info">Általános információk</button>
    </div>
  </mat-toolbar>

</div>
