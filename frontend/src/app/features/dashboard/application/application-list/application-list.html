<div class="single-page-wrapper mw-lg">
  <div class="page-header">
    <h1>Érdeklődők</h1>
  </div>

  <div class="filters-bar space-after">
    <div class="filters">
      <mat-button-toggle-group [formControl]="stateFilter" (change)="loadApplications()">
        <mat-button-toggle [value]="'live'">Élő</mat-button-toggle>
        <mat-button-toggle [value]="'closed'">Lezárt</mat-button-toggle>
        <mat-button-toggle [value]="'all'">Mind</mat-button-toggle>
      </mat-button-toggle-group>
    </div>
  </div>

  <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSort($event)">

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>E-mail</th>
      <td mat-cell *matCellDef="let application">{{ application.email }}</td>
    </ng-container>

    <ng-container matColumnDef="fullName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Teljes név</th>
      <td mat-cell *matCellDef="let application">{{ application.fullName }}</td>
    </ng-container>

    <ng-container matColumnDef="companyName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Cégnév</th>
      <td mat-cell *matCellDef="let application">{{ application.companyName }}</td>
    </ng-container>

    <ng-container matColumnDef="referralCode">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Ajánlói kód</th>
      <td mat-cell *matCellDef="let application">{{ application.referralCode }}</td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Regisztrált</th>
      <td mat-cell *matCellDef="let application">{{ application.createdAt | date:'yyyy.MM.dd HH:mm' }}</td>
    </ng-container>

    <ng-container matColumnDef="state">
      <th mat-header-cell *matHeaderCellDef>Státusz</th>
      <td mat-cell *matCellDef="let application">
        <mat-chip-set>
          <mat-chip [class]="applicationStateClass(application.state)">
            {{ applicationStateLabel(application.state) }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>

      <td mat-cell *matCellDef="let application">
        <button mat-icon-button matTooltip="Megtekintés" [routerLink]="['/applications', application.id]">
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['email', 'fullName', 'companyName', 'referralCode', 'createdAt', 'state', 'actions']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['email', 'fullName', 'companyName', 'referralCode', 'createdAt', 'state', 'actions']"></tr>

  </table>

  <mat-paginator
    [length]="totalElements"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [pageSizeOptions]="[10, 20, 50]"
    (page)="onPage($event)">
  </mat-paginator>
</div>
