<div class="form-page-wrapper mw-sm">
  <div class="page-header">
    <h1>Elfelejtett jelszó</h1>
  </div>

  <form [formGroup]="form">
    <div class="form-page">
      <section class="form-block">
        <mat-form-field appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput formControlName="email" required email/>
          @if (email.hasError('email') && email.touched) {
            <mat-error>
              Hibás e-mail cím formátum
            </mat-error>
          }
        </mat-form-field>

      </section>
    </div>

    <div class="form-actions">
      <button matButton type="button" (click)="cancel()">
        Mégsem
      </button>

      <button matButton="elevated" (click)="submit()" [disabled]="form.invalid">
        Jelszó csere indítása
      </button>
    </div>
  </form>
</div>
