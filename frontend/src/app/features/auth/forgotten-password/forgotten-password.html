<div class="register-page">

  <div class="brand">
    myIBC
  </div>

  <div class="form-page-wrapper">
    <div class="page-header">
      <h1>Elfelejtett jelszó</h1>
    </div>

    <form class="form-page" [formGroup]="form">
      <section class="form-block">
        <mat-form-field appearance="outline">
          <mat-label>E-mail</mat-label>
          <input matInput formControlName="email" name="email" required email/>
          @if (form.get('email')?.hasError('email') && form.get('email')?.touched) {
            <mat-error>
              Hibás e-mail cím formátum
            </mat-error>
          }
        </mat-form-field>

        <div class="form-actions">
          <button matButton="elevated" (click)="submit()" [disabled]="form.invalid">
            Jelszó csere indítása
          </button>
        </div>
      </section>
    </form>
  </div>
</div>
