<div class="login-page">

  <div class="brand">
    myIBC
  </div>

  <mat-card class="login-card">

    <mat-card-header>
      <mat-card-title>Bejelentkezés</mat-card-title>
    </mat-card-header>

    <mat-card-content>

      <form class="login-form" (ngSubmit)="onLogin()">

        <mat-form-field>
          <mat-label>Felhasználónév</mat-label>
          <input matInput [(ngModel)]="username" name="username">
        </mat-form-field>

        <mat-form-field>
          <mat-label>Jelszó</mat-label>
          <input matInput type="password"
                 [(ngModel)]="password"
                 name="password">
        </mat-form-field>

        <button matButton="elevated" type="submit">
          Bejelentkezés
        </button>

        <button matButton>
          Regisztráció
        </button>
      </form>

    </mat-card-content>

  </mat-card>

</div>
