<div class="register-page">

  <div class="brand">
    myIBC
  </div>

  <div class="form-page-wrapper">
    <div class="page-header">
      <h1>Regisztráció véglegesítése</h1>
    </div>

    <form class="form-page" [formGroup]="form">
      <section class="form-block">
        <mat-form-field appearance="outline">
          <mat-label>Jelszó</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" name="password" formControlName="password"/>
          <button mat-icon-button matSuffix type="button" (click)="togglePasswordVisibility()">
            <mat-icon>
              {{ hidePassword ? 'visibility_off' : 'visibility' }}
            </mat-icon>
          </button>
          @if (checkRequired()) {
            <mat-error>Jelszó kötelező</mat-error>
          }
          @if (checkMinLength()) {
            <mat-error>Minimum 8 karakter</mat-error>
          }
          @if (checkAllCharTypes()) {
            <mat-error>Min. egy szám, nagy- és kisbetű</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Jelszó újra</mat-label>
          <input matInput [type]="hideConfirmPassword ? 'password' : 'text'" name="confirmPassword"  formControlName="confirmPassword"/>
          <button mat-icon-button matSuffix type="button" (click)="toggleConfirmPasswordVisibility()">
            <mat-icon>
              {{ hideConfirmPassword ? 'visibility_off' : 'visibility' }}
            </mat-icon>
          </button>
          @if (form.get('confirmPassword')?.hasError('passwordMismatch')) {
            <mat-error>A jelszavak nem egyeznek</mat-error>
          }
        </mat-form-field>

        <div class="form-actions">
          <button matButton="elevated" color="primary" (click)="submit()" [disabled]="form.invalid">
            Jelszó beállítása
          </button>
        </div>
      </section>
    </form>
  </div>
</div>
